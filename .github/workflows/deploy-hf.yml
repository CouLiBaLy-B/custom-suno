# ============================================================
#  🚀 CI/CD - Déploiement automatique sur Hugging Face Spaces
# ============================================================
# Configurer dans Settings → Secrets and variables → Actions:
#   Secrets:  HF_TOKEN
#   Variables: HF_USERNAME, HF_SPACE_NAME
# ============================================================

name: 🚀 Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hf-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Deploy to HF Spaces
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install HF CLI
        run: |
          python -m pip install --upgrade pip
          pip install --quiet huggingface_hub "huggingface_hub[cli]"

      - name: 🔑 Check required secrets
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "::error::Secret HF_TOKEN manquant! Allez dans Settings → Secrets → New secret"
            exit 1
          fi
          if [ -z "${{ vars.HF_USERNAME }}" ]; then
            echo "::error::Variable HF_USERNAME manquante! Allez dans Settings → Variables → New variable"
            exit 1
          fi
          if [ -z "${{ vars.HF_SPACE_NAME }}" ]; then
            echo "::error::Variable HF_SPACE_NAME manquante! Allez dans Settings → Variables → New variable"
            exit 1
          fi
          echo "✅ Secrets OK: HF_USERNAME=${{ vars.HF_USERNAME }}, HF_SPACE_NAME=${{ vars.HF_SPACE_NAME }}"

      - name: 🚀 Deploy via Python script
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_SPACE_NAME: ${{ vars.HF_SPACE_NAME }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 << 'PYEOF'
          import os
          import sys
          from pathlib import Path

          HF_TOKEN = os.environ["HF_TOKEN"]
          HF_USERNAME = os.environ["HF_USERNAME"]
          HF_SPACE_NAME = os.environ["HF_SPACE_NAME"]
          GITHUB_SHA = os.environ.get("GITHUB_SHA", "unknown")[:7]
          REPO_ID = f"{HF_USERNAME}/{HF_SPACE_NAME}"

          print(f"🚀 Déploiement vers: {REPO_ID}")
          print(f"📁 Répertoire de travail: {os.getcwd()}")

          # Se connecter
          from huggingface_hub import login, HfApi
          login(token=HF_TOKEN, add_to_git_credential=True)
          api = HfApi()

          # Créer le space s'il n'existe pas
          try:
              info = api.space_info(REPO_ID)
              print(f"✅ Space existe: {REPO_ID} (SDK: {info.sdk})")
          except Exception:
              print(f"🆕 Création du Space: {REPO_ID}")
              api.create_repo(
                  repo_id=REPO_ID,
                  repo_type="space",
                  space_sdk="docker",
              )
              print(f"✅ Space créé!")

          # Préparer les fichiers à uploader (exclure les inutiles)
          project_root = Path(os.getcwd())
          ignore_patterns = {
              "__pycache__", ".git", ".github", ".venv",
              "models", "storage", "logs", "tests",
              ".env", "*.db", "*.pyc", "node_modules",
              "generate_project.py", "run.sh", "docker-compose.yml",
              "DEPLOYMENT.md", ".gitignore",
          }

          files_to_upload = []
          for f in project_root.rglob("*"):
              if f.is_file():
                  # Vérifier si un parent est dans les patterns à ignorer
                  skip = False
                  for part in f.parts:
                      if part in ignore_patterns:
                          skip = True
                          break
                  for pat in ["*.pyc", "*.db", "*.env"]:
                      import fnmatch
                      if fnmatch.fnmatch(f.name, pat):
                          skip = True
                          break
                  if not skip:
                      files_to_upload.append(f)

          print(f"📤 {len(files_to_upload)} fichiers à uploader")

          # Upload
          result = api.upload_folder(
              folder_path=str(project_root),
              repo_id=REPO_ID,
              repo_type="space",
              ignore_patterns=[
                  "__pycache__/**", ".git/**", ".github/**",
                  ".venv/**", "models/**", "storage/**",
                  "logs/**", "tests/**", ".env", "*.db",
                  "*.pyc", "node_modules/**",
                  "generate_project.py",
              ],
              commit_message=f"🚀 Deploy from GitHub Actions - {GITHUB_SHA}",
              create_pr=False,
          )

          print(f"✅ Upload réussi: {result}")
          print(f"🌐 https://huggingface.co/spaces/{REPO_ID}")
          PYEOF

      - name: 📢 Summary
        if: always()
        run: |
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "  🎵 AI Music Studio - Déploiement"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "  🌐 https://huggingface.co/spaces/${{ vars.HF_USERNAME }}/${{ vars.HF_SPACE_NAME }}"
          echo ""
          echo "  ⚙️ Post-déploiement requis :"
          echo "  1. Settings → Hardware → T4 Small (gratuit)"
          echo "  2. Reboot du Space"
          echo ""
          echo "═══════════════════════════════════════════════"
