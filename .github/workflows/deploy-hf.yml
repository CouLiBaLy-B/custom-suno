# ============================================================
#  🚀 CI/CD - Déploiement automatique sur Hugging Face Spaces
# ============================================================
# Secrets/Variables requis dans GitHub Settings → Actions:
#   Secret:    HF_TOKEN  (token Write de huggingface.co/settings/tokens)
#   Variable:  HF_USERNAME  (ex: CouLiBaLy-B)
#   Variable:  HF_SPACE_NAME  (ex: ai-music-studio)
# ============================================================

name: 🚀 Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hf-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Deploy to HF Spaces
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Setup Python (minimal)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install HF CLI uniquement
        run: |
          python -m pip install --upgrade pip
          pip install --quiet huggingface_hub

      - name: 🔑 Vérifier secrets
        run: |
          missing=0
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "::error::Secret HF_TOKEN manquant!"
            missing=1
          fi
          if [ -z "${{ vars.HF_USERNAME }}" ]; then
            echo "::error::Variable HF_USERNAME manquante!"
            missing=1
          fi
          if [ -z "${{ vars.HF_SPACE_NAME }}" ]; then
            echo "::error::Variable HF_SPACE_NAME manquante!"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Configuration requise:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  1. Allez dans: Settings → Secrets and variables → Actions"
            echo "  2. Onglet Secrets → New repository secret:"
            echo "     Name: HF_TOKEN  |  Value: hf_votre_token"
            echo "  3. Onglet Variables → New repository variable:"
            echo "     Name: HF_USERNAME  |  Value: CouLiBaLy-B"
            echo "     Name: HF_SPACE_NAME |  Value: ai-music-studio"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi
          echo "✅ Tous les secrets sont configurés"

      - name: 🚀 Upload vers Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_SPACE_NAME: ${{ vars.HF_SPACE_NAME }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 - << 'PYEOF'
          import os, sys
          from pathlib import Path

          HF_TOKEN = os.environ["HF_TOKEN"]
          HF_USERNAME = os.environ["HF_USERNAME"]
          HF_SPACE_NAME = os.environ["HF_SPACE_NAME"]
          SHA = os.environ.get("GITHUB_SHA", "manual")[:7]
          REPO_ID = f"{HF_USERNAME}/{HF_SPACE_NAME}"

          print(f"🚀 Déploiement vers: {REPO_ID}")

          from huggingface_hub import login, HfApi
          login(token=HF_TOKEN, add_to_git_credential=True)
          api = HfApi()

          # Créer le space si besoin
          try:
              info = api.space_info(REPO_ID)
              print(f"✅ Space existe déjà: {REPO_ID} (SDK: {info.sdk})")
          except Exception:
              print(f"🆕 Création du Space: {REPO_ID}")
              api.create_repo(repo_id=REPO_ID, repo_type="space", space_sdk="docker")
              print(f"✅ Space créé!")

          # Uploader tous les fichiers du repo
          print(f"📤 Upload depuis: {os.getcwd()}")
          result = api.upload_folder(
              folder_path=os.getcwd(),
              repo_id=REPO_ID,
              repo_type="space",
              ignore_patterns=[
                  "__pycache__/**", ".git/**", ".github/**",
                  ".venv/**", "node_modules/**",
                  "*.pyc", ".env", "*.db",
                  "generate_project.py",
              ],
              commit_message=f"🚀 Deploy from GitHub Actions ({SHA})",
              create_pr=False,
          )

          print(f"✅ Upload réussi: {result}")
          print(f"🌐 https://huggingface.co/spaces/{REPO_ID}")
          PYEOF

      - name: 📢 Résumé
        if: always()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🎵 AI Music Studio — Déploiement"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  🌐 https://huggingface.co/spaces/${{ vars.HF_USERNAME }}/${{ vars.HF_SPACE_NAME }}"
          echo ""
          echo "  ⚙️ Post-déploiement:"
          echo "  1. Space Settings → Hardware → T4 Small (gratuit)"
          echo "  2. Space Settings → Rebuild"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
